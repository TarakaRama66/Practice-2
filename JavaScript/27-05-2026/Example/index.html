<!DOCTYPE html>
<head>
  <title>Cart Project</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<h1>Cart System</h1>
<input type="text";id="search";placeholder="Search Product";onkeyup="searchProducts()">
<div class="container">
  <!-- Products -->
  <div class="products">
    <h2>Products</h2>
    <div id="productList"></div>
  </div>
  <!-- Cart -->
  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <div class="total" id="totalPrice">
      Total: ₹0
    </div>
  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
