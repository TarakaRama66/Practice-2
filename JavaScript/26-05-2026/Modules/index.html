<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JavaScript Modules</title>

  <style>

    body{
      font-family: Arial;
      padding: 20px;
    }

    .box{
      background-color: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    p{
      color: green;
      font-weight: bold;
    }

  </style>

</head>

<body>

  <div class="box">

    <h2>User Details</h2>

    <p id="demo"></p>

  </div>

  <!-- MODULE FILE -->
  <script type="module" src="script.js"></script>

</body>
</html>
