<!DOCTYPE html>
<head>
  <title>JavaScript Loops</title>
  <style>
    body{
      font-family: Arial;
      padding: 20px;
      background-color: #f4f4f4;
    }

    .box{
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    h2{
      color: darkblue;
    }

    button{
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
    }

    p{
      color: green;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <h1>Loops</h1>

  <div class="box">
    <h2>For Loop</h2>
    <button onclick="forLoop()">
      Show Numbers
    </button>
    <p id="demo1"></p>
  </div>

  <div class="box">
    <h2>While Loop</h2>
    <button onclick="whileLoop()">
      Countdown
    </button>
    <p id="demo2"></p>
  </div>

  <div class="box">
    <h2>Do While Loop</h2>
    <button onclick="doWhileLoop()">
      Login Attempts
    </button>
    <p id="demo3"></p>
  </div>

  <div class="box">
    <h2>For Of Loop</h2>
    <button onclick="forOfLoop()">
      Show Fruits
    </button>
    <p id="demo4"></p>
  </div>

  <div class="box">
    <h2>For In Loop</h2>
    <button onclick="forInLoop()">
      Show User Details
    </button>
    <p id="demo5"></p>
  </div>

  <div class="box">
    <h2>forEach Loop</h2>
    <button onclick="forEachLoop()">
      Show Prices
    </button>
    <p id="demo6"></p>
  </div>

  <script src="./Script.js"></script>

</body>
</html>
