<body>

  <h1>Functions</h1>


  <!-- NORMAL FUNCTION -->
  <div class="box">

    <h2>Normal Function</h2>

    <button onclick="showMessage()">
      Click Me
    </button>

    <p id="demo1"></p>

  </div>

  <div class="box">

    <h2>Function with Parameters</h2>

    <input type="number" id="num1" placeholder="Enter First Number">

    <br><br>

    <input type="number" id="num2" placeholder="Enter Second Number">

    <br>

    <button onclick="addNumbers()">
      Add Numbers
    </button>

    <p id="demo2"></p>

  </div>

  <div class="box">

    <h2>Function with Return</h2>

    <button onclick="showSquare()">
      Find Square
    </button>

    <p id="demo3"></p>

  </div>

  <div class="box">
    <h2>Arrow Function</h2>
    <button onclick="showGreeting()">
      Show Greeting
    </button>
    <p id="demo4"></p>
  </div>
  <div class="box">

    <h2>Callback Function</h2>

    <button onclick="processData(displayResult)">
      Process Data
    </button>

    <p id="demo5"></p>

  </div>


  <script src="./script.js"></script>

    
</body>
