<!DOCTYPE html>
<html>
<head>
  <title>Login Error Handling</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 10px 0;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #message {
      color: red;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h2>Login Form</h2>

  <input type="text" id="username" placeholder="Enter Username">
  <br>

  <input type="password" id="password" placeholder="Enter Password">
  <br>

  <button onclick="login()">
    Login
  </button>

  <p id="message"></p>

  <script src="./script.js"></script>

</body>
</html>
