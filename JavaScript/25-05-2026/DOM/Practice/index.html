<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dom Event Preferences</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>DOM Event Preferences</h1>

  <!-- Normal Event -->
  <h2 id="title">Hello JavaScript</h2>

  <button id="changeBtn">Change Text</button>

  <hr>

  <!-- Debouncing -->
  <h2>Debouncing Example</h2>

  <input type="text" id="search" placeholder="Type Something">

  <hr>

  <!-- Throttling -->
  <h2>Throttling Example</h2>

  <div class="scroll-box" id="scrollBox">
    <div class="content">
      Scroll Here...
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
