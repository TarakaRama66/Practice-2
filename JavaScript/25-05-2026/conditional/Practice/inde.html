<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript Conditions</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f4;
    }

    h2 {
      color: darkblue;
      margin-top: 30px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 5px gray;
    }

    p {
      color: green;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Conditional Statements</h1>

  <!-- Comparison Operator -->
  <div class="box">
    <h2>Comparison Operator (!=)</h2>
    <p id="demo1"></p>
  </div>

  <!-- else if -->
  <div class="box">
    <h2>Else If Condition</h2>
    <p id="demo2"></p>
  </div>

  <!-- if condition -->
  <div class="box">
    <h2>If Condition</h2>
    <p id="demo3"></p>
  </div>

  <!--if else -->
  <div class="box">
    <h2>If Else Condition</h2>
    <p id="demo4"></p>
  </div>

  <!--Nested if -->
  <div class="box">
    <h2>Nested If</h2>
    <p id="demo6"></p>
  </div>

  <!--Switch -->
  <div class="box">
    <h2>Switch Statement</h2>
    <p id="demo7"></p>
  </div>

  <!--Ternary Operator -->
  <div class="box">
    <h2>Ternary Operator</h2>
    <p id="demo8"></p>
  </div>

  <script src="./script.js">
  </script>

</body>
</html>
